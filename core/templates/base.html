{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Casa da Birita</title>
    <link rel="stylesheet" href="{% static 'style.css' %}">
</head>
<body>
    <header class="main-header">
        <img src="{% static 'images/logo.png' %}" alt="Logo Casa da Birita" id="logo">
        <nav class="main-nav">
            <div class="nav-links">
                <a href="{% url 'home' %}">Home</a>
                <a href="">Produtos</a>
                <a href="">Sobre</a>
                <a href="">Contato</a>
            </div>
            <div class="right-actions">
                <form method="GET" action="{% url 'home' %}" class="search-form">
                    <input type="text" name="q" placeholder="Buscar bebida..." class="search-input" value="{{ termo_buscado|default_if_none:'' }}">
                    <button type="submit" class="btn-search">Buscar</button>
                </form>
                <button class="btn-cart" onclick="abrirCarrinho()">
                    🛒
                    <span class="cart-counter" id="cart-counter">0</span>
                </button>
            </div>
        </nav>
    </header>
    
    <main>
        {% block conteudo_principal %}
        {% endblock conteudo_principal %}
    </main>
    
    <footer>
        <p>&copy; 2026 - Casa da Birita - Todos os Direitos Reservados</p>
    </footer>

    <div class="cart-overlay" id="cartOverlay" onclick="fecharCarrinho()"></div>

    <aside class="cart-sidebar" id="cartSidebar">
        <div class="cart-header">
            <h2>Seu Carrinho</h2>
            <button class="fechar-carrinho" onclick="fecharCarrinho()">X</button>
        </div>
        
        <div class="cart-items" id="cart-items-container">
            </div>
        
        <div class="cart-footer">
            <div class="cart-total">
                <span>Total:</span>
                <span id="cart-total-value">R$ 0,00</span>
            </div>
            <button class="btn-finalizar">Finalizar Compra</button>
        </div>
    </aside>

    <script src="{% static 'scripts.js' %}"></script>
</body>
</html>
